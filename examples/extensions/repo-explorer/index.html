<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Repo Explorer</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 1rem 1.25rem;
        font-size: 14px;
      }
      h2 { margin: 0 0 0.25rem; font-size: 1rem; }
      .ctx { color: #888; font-size: 0.8rem; margin-bottom: 0.75rem; word-break: break-all; }
      .bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
      .path { font-family: ui-monospace, monospace; font-size: 0.8rem; color: #6b7280; }
      button {
        font: inherit; font-size: 0.8rem; cursor: pointer;
        border: 1px solid #cbd5e1; border-radius: 6px; padding: 0.15rem 0.5rem;
        background: transparent; color: inherit;
      }
      button:hover { background: rgba(125, 125, 125, 0.12); }
      ul { list-style: none; margin: 0; padding: 0; }
      li {
        display: flex; align-items: center; gap: 0.45rem;
        padding: 0.2rem 0.35rem; border-radius: 5px;
      }
      li.dir { cursor: pointer; }
      li.dir:hover { background: rgba(56, 189, 248, 0.14); }
      .name { font-family: ui-monospace, monospace; }
      .notice {
        border: 1px dashed #cbd5e1; border-radius: 8px; padding: 1rem;
        color: #6b7280; font-size: 0.85rem; line-height: 1.5;
      }
      code { background: rgba(125, 125, 125, 0.16); padding: 0 0.25rem; border-radius: 3px; }
      .git {
        font-family: ui-monospace, monospace; font-size: 0.8rem;
        margin-bottom: 0.5rem; color: #6b7280;
      }
      .git .branch { color: #0ea5e9; font-weight: 600; }
    </style>
  </head>
  <body>
    <h2>Repo Explorer</h2>
    <div class="ctx" id="ctx">Loading project context&hellip;</div>
    <div class="git" id="git"></div>

    <div class="bar">
      <button id="up" title="Parent directory">&uarr; up</button>
      <span class="path" id="cwd">.</span>
      <button id="refresh" style="margin-left: auto">refresh</button>
    </div>

    <div id="body"></div>

    <!--
      repo-explorer demonstrates the full iframe-extension surface:
        • getContext      → the project this panel is scoped to (no permission)
        • listFiles(path) → browse the repo tree (requires the "fs" capability)
        • gitStatus()     → branch + dirty file count (requires the "git" capability)

      It is contributed as a projectPanel, so the dashboard mounts it inside a
      project's view and passes that project's id/cwd into the RPC context.

      To run it: copy this folder into ~/.pid/extensions/ (global) or a
      project's .pid/extensions/ (local), restart the daemon, open a project,
      and grant the "fs" capability to repo-explorer in the Extensions tab.
    -->

    <script>
      const ctxEl = document.getElementById("ctx")
      const gitEl = document.getElementById("git")
      const cwdEl = document.getElementById("cwd")
      const bodyEl = document.getElementById("body")
      const upBtn = document.getElementById("up")
      const refreshBtn = document.getElementById("refresh")

      // The iframe runs in an opaque origin (sandbox="allow-scripts"), so RPC
      // messages must target "*". Each request carries a unique id; the host's
      // reply echoes it so concurrent calls don't cross wires.
      let nextId = 1
      function rpc(method, params) {
        return new Promise((resolve, reject) => {
          const id = nextId++
          function onMessage(event) {
            const data = event.data
            if (!data || data.id !== id) return
            window.removeEventListener("message", onMessage)
            if (data.ok === false || data.error) reject(new Error(data.error || "rpc failed"))
            else resolve(data.result)
          }
          window.addEventListener("message", onMessage)
          parent.postMessage({ id, method, params }, "*")
        })
      }

      let dir = "."

      function joinPath(base, name) {
        return base === "." ? name : base + "/" + name
      }
      function parentPath(p) {
        if (p === "." || p === "") return "."
        const idx = p.lastIndexOf("/")
        return idx === -1 ? "." : p.slice(0, idx)
      }

      function renderGrantNotice() {
        bodyEl.innerHTML =
          '<div class="notice">This panel needs the <code>fs</code> capability to ' +
          "browse files. Open the dashboard <strong>Extensions</strong> tab and grant " +
          "<strong>fs</strong> to <code>repo-explorer</code>, then press " +
          "<strong>refresh</strong>.</div>"
      }

      function renderEntries(listing) {
        const entries = (listing && listing.entries) || []
        if (entries.length === 0) {
          bodyEl.innerHTML = '<div class="notice">Empty directory.</div>'
          return
        }
        // Directories first, then files; each alphabetical.
        entries.sort((a, b) => {
          const ad = a.type === "dir" ? 0 : 1
          const bd = b.type === "dir" ? 0 : 1
          return ad - bd || a.name.localeCompare(b.name)
        })
        const ul = document.createElement("ul")
        for (const e of entries) {
          const li = document.createElement("li")
          const icon = e.type === "dir" ? "📁" : e.type === "symlink" ? "🔗" : "📄"
          li.innerHTML = '<span>' + icon + '</span><span class="name"></span>'
          li.querySelector(".name").textContent = e.name
          if (e.type === "dir") {
            li.className = "dir"
            li.addEventListener("click", () => load(joinPath(dir, e.name)))
          }
          ul.appendChild(li)
        }
        bodyEl.innerHTML = ""
        bodyEl.appendChild(ul)
      }

      async function load(path) {
        dir = path
        cwdEl.textContent = path
        upBtn.disabled = path === "."
        bodyEl.innerHTML = '<div class="notice">Loading&hellip;</div>'
        try {
          const listing = await rpc("listFiles", { path })
          renderEntries(listing)
        } catch (err) {
          // The permission gate rejects listFiles until "fs" is granted.
          if (/permission/i.test(err.message)) renderGrantNotice()
          else bodyEl.innerHTML = '<div class="notice">Error: ' + err.message + "</div>"
        }
      }

      upBtn.addEventListener("click", () => load(parentPath(dir)))
      refreshBtn.addEventListener("click", () => load(dir))

      rpc("getContext")
        .then((ctx) => {
          ctxEl.textContent =
            "project: " + (ctx.projectId || "(none)") + "  ·  cwd: " + (ctx.cwd || "(none)")
        })
        .catch((err) => {
          ctxEl.textContent = "context error: " + err.message
        })

      // Repo-context contract: show the current branch + dirty file count.
      // Needs the "git" capability — silently skipped until granted.
      function loadGitStatus() {
        rpc("gitStatus")
          .then((s) => {
            const dirty = (s.entries || []).length
            const branch = s.branch || "(detached)"
            gitEl.innerHTML =
              'on <span class="branch"></span> · ' +
              (dirty === 0 ? "clean" : dirty + " uncommitted change" + (dirty === 1 ? "" : "s"))
            gitEl.querySelector(".branch").textContent = branch
          })
          .catch((err) => {
            gitEl.textContent = /permission/i.test(err.message)
              ? "grant the “git” capability to see branch status"
              : ""
          })
      }

      refreshBtn.addEventListener("click", loadGitStatus)
      loadGitStatus()
      load(".")
    </script>
  </body>
</html>
