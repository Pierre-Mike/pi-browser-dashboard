name: PR e2e

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pr-e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # post / update the sticky comment
  actions: read         # read artifact metadata for the comment

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/e2e
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright e2e
        id: e2e
        run: bun run test:e2e

      # Flatten screenshots into a single directory so the artifact viewer
      # shows them all in one place. Private-repo PRs cannot embed images
      # via raw.githubusercontent.com (token-gated, sanitizer strips data:
      # URIs), so the artifact viewer is the canonical place to see them.
      - name: Collect screenshots
        if: always()
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/pr-screenshots"
          rm -rf "$out"
          mkdir -p "$out"
          src="apps/e2e/test-results"
          if [ ! -d "$src" ]; then
            echo "no test-results dir produced"
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "dir=$out" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count=0
          # Each test produces a dir like <project>-<spec>-<title>/test-finished-N.png
          while IFS= read -r -d '' png; do
            dir=$(dirname "$png")
            slug=$(basename "$dir")
            base=$(basename "$png" .png)
            cp "$png" "$out/${slug}__${base}.png"
            count=$((count+1))
          done < <(find "$src" -type f -name '*.png' -print0)
          echo "Collected $count screenshots → $out"
          ls -la "$out" || true
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "dir=$out" >> "$GITHUB_OUTPUT"

      - name: Upload screenshots artifact
        if: always() && steps.collect.outputs.count != '0'
        id: upload_shots
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number || github.run_id }}-screenshots
          path: ${{ steps.collect.outputs.dir }}
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload full test-results artifact
        if: always()
        id: upload_results
        uses: actions/upload-artifact@v4
        with:
          name: pr-${{ github.event.pull_request.number || github.run_id }}-test-results
          path: |
            apps/e2e/test-results
            apps/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Write job summary
        if: always()
        shell: bash
        env:
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          SHOT_COUNT: ${{ steps.collect.outputs.count }}
          SHOT_DIR: ${{ steps.collect.outputs.dir }}
          SHOTS_URL: ${{ steps.upload_shots.outputs.artifact-url }}
          RESULTS_URL: ${{ steps.upload_results.outputs.artifact-url }}
        run: |
          {
            echo "## Playwright e2e — \`${GITHUB_SHA:0:7}\`"
            echo
            echo "- Result: **${E2E_OUTCOME}**"
            echo "- Screenshots captured: **${SHOT_COUNT}**"
            if [ -n "${SHOTS_URL:-}" ]; then
              echo "- [Browse screenshots in the artifact viewer](${SHOTS_URL})"
            fi
            if [ -n "${RESULTS_URL:-}" ]; then
              echo "- [Download full test-results (traces, videos, HTML report)](${RESULTS_URL})"
            fi
            echo
            if [ -d "${SHOT_DIR:-}" ] && [ "${SHOT_COUNT:-0}" != "0" ]; then
              echo "### Captured tests"
              echo
              find "${SHOT_DIR}" -name '*.png' -printf '%f\n' \
                | sed 's/__test-finished-[0-9]*\.png$//' \
                | sort -u \
                | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post sticky PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          SHOT_COUNT: ${{ steps.collect.outputs.count }}
          SHOT_DIR: ${{ steps.collect.outputs.dir }}
          SHOTS_URL: ${{ steps.upload_shots.outputs.artifact-url }}
          RESULTS_URL: ${{ steps.upload_results.outputs.artifact-url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pr-e2e-screenshots -->';
            const outcome = process.env.E2E_OUTCOME || 'unknown';
            const count = Number(process.env.SHOT_COUNT || '0');
            const shotDir = process.env.SHOT_DIR || '';
            const shotsUrl = process.env.SHOTS_URL || '';
            const resultsUrl = process.env.RESULTS_URL || '';
            const headSha = (process.env.HEAD_SHA || '').slice(0, 7);
            const runUrl = process.env.RUN_URL;
            const branch = process.env.BRANCH || '';

            const { owner, repo } = context.repo;

            // Resolve the PR number. On pull_request events context.issue.number
            // is the PR; on workflow_dispatch / push it's empty, so fall back
            // to looking up an open PR for the head branch.
            let issue_number = context.issue.number;
            if (!issue_number && branch) {
              const { data: prs } = await github.rest.pulls.list({
                owner, repo, state: 'open', head: `${owner}:${branch}`, per_page: 1,
              });
              if (prs[0]) issue_number = prs[0].number;
            }
            if (!issue_number) {
              core.info(`no open PR for branch=${branch}; skipping sticky comment`);
              return;
            }

            const icon = outcome === 'success' ? '✅' : outcome === 'failure' ? '❌' : '⚠️';

            // Group PNG basenames by spec/title (drop the trailing __test-finished-N.png).
            let tests = [];
            if (shotDir && count > 0) {
              const seen = new Set();
              for (const f of fs.readdirSync(shotDir).filter((x) => x.endsWith('.png')).sort()) {
                const title = f.replace(/__test-finished-\d+\.png$/, '');
                if (!seen.has(title)) {
                  seen.add(title);
                  tests.push(title);
                }
              }
            }

            let body = `${marker}\n## ${icon} Playwright e2e — \`${headSha}\`\n\n`;
            body += `- Result: **${outcome}**\n`;
            body += `- Screenshots captured: **${count}**\n`;
            body += `- [Workflow run](${runUrl})\n`;
            if (shotsUrl) {
              body += `- 🖼️ **[Browse screenshots in artifact viewer](${shotsUrl})** — opens an authenticated GitHub page where you can preview each PNG inline.\n`;
            }
            if (resultsUrl) {
              body += `- 📦 [Download full test-results (traces, videos, HTML report)](${resultsUrl})\n`;
            }
            body += `\n`;
            body += `> Inline images are not embedded because this is a private repo: GitHub's markdown sanitizer strips \`data:\` URIs and \`raw.githubusercontent.com\` URLs require per-request tokens. Click the artifact link above to preview screenshots in the authenticated Actions UI.\n`;

            if (tests.length > 0) {
              body += `\n<details open><summary>Captured tests (${tests.length})</summary>\n\n`;
              for (const t of tests) body += `- \`${t}\`\n`;
              body += `\n</details>\n`;
            } else if (outcome === 'failure') {
              body += `\n_No screenshots were collected. Inspect the workflow run for traces and videos._\n`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail job if e2e failed
        if: steps.e2e.outcome == 'failure'
        run: exit 1
