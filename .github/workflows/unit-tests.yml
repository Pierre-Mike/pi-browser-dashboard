name: Unit tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: unit-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: biome ci (lint + format)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Biome ci
        run: bun run lint:ci

  bun-test:
    name: bun test (daemon + web + cli)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Feature-test floor
        run: bun run check:feature-tests

      - name: Run unit tests
        run: bun run test

      - name: Run web unit tests
        run: bun run test:web

      - name: Run cli unit tests
        run: bun run test:cli

  dead-code:
    name: fallow audit (dead code)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    env:
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Audit changed files for dead code
        run: |
          git fetch --no-tags --depth=50 origin "${{ github.base_ref }}"
          bun run dead-code:audit -- --base "origin/${{ github.base_ref }}"
